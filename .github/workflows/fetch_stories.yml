name: Fetch Instagram Stories

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

concurrency:
  group: fetch-instagram-stories
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      RAILS_ENV: production
      RACK_ENV: production
      SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
      PLAYWRIGHT_HEADLESS: "true"
      PLAYWRIGHT_NO_SANDBOX: "true"
      PLAYWRIGHT_CLI_EXECUTABLE_PATH: npx playwright
      INSTAGRAM_TARGET_PROFILE: iskacame
      INSTAGRAM_STORAGE_STATE_PATH: tmp/instagram_auth.json
      STORY_CACHE_WRITE_URL: https://iskacame.mk/internal/story_cache
      STORY_CACHE_WRITE_TOKEN: ${{ secrets.STORY_CACHE_WRITE_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: .ruby-version
          bundler-cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore Instagram session
        env:
          INSTAGRAM_STORAGE_STATE_BASE64: ${{ secrets.INSTAGRAM_STORAGE_STATE_BASE64 }}
        run: |
          test -n "$INSTAGRAM_STORAGE_STATE_BASE64"
          mkdir -p tmp
          printf '%s' "$INSTAGRAM_STORAGE_STATE_BASE64" | base64 -d > "$INSTAGRAM_STORAGE_STATE_PATH"

      - name: Check publish token
        run: test -n "$STORY_CACHE_WRITE_TOKEN"

      - name: Fetch and publish stories
        run: bundle exec rails stories:fetch_and_publish
